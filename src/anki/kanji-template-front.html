<main>
  <div class="block">
    <div class="kanji" hidden>{{Kanji}}</div>
    <div class="sub">
      {{#Meaning}}
      <div class="sub-block meaning">
        <div class="title">Meaning</div>
        <div class="meaning-content">{{Meaning}}</div>
      </div>
      {{/Meaning}} {{#Vocab}}
      <div class="sub-block vocab">
        <div class="title">Vocab</div>
        {{furigana:Vocab}}
      </div>
      {{/Vocab}} {{#Onyomi}}
      <div class="sub-block onyomi">
        <div class="title">Onyomi</div>
        {{Onyomi}}
      </div>
      {{/Onyomi}} {{#Kunyomi}}
      <div class="sub-block kunyomi">
        <div class="title">Kunyomi</div>
        {{Kunyomi}}
      </div>
      {{/Kunyomi}}
    </div>
  </div>
</main>

<script>
  function main() {
    "use strict";
    // Hide kanji in vocab
    const $kanji = document.querySelector(".kanji");
    const kanji = $kanji.textContent;
    const $vocab = document.querySelector(".vocab");
    const $meaning = document.querySelector(".meaning-content");
    if ($vocab) {
      $meaning.classList.add("spoiler");
      const iterator = document.createNodeIterator(
        $vocab,
        NodeFilter.SHOW_TEXT,
      );
      let node;
      while ((node = iterator.nextNode()))
        node.nodeValue = node.nodeValue.replaceAll(kanji, "◯");
    }

    for (const x of $vocab.querySelectorAll(".en")) x.classList.add("spoiler");

    // If no sub, show kanji
    const $sub = document.querySelector(".sub");
    if ($sub.children.length === 0) {
      $kanji.removeAttribute("hidden");
      $sub.remove();
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "c")
        for (const x of document.querySelectorAll(".spoiler"))
          x.classList.toggle("shown");
    });
  }

  if (document.readyState === "complete") main();
  else document.addEventListener("DOMContentLoaded", main);
</script>
